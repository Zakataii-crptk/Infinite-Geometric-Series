<div id="loginPage">
    <h1>Quiz: Infinite Geometric Series</h1>
    <h3>Determine whether the following infinite geometric series converges or diverges.</h3>

    <input id="name" placeholder="Full Name">
    <input id="number" placeholder="Student Number">

    <button onclick="startExam()">Start Exam</button>
</div>

    <p><b>Questions Generated:</b> <span id="count">0</span>/5</p>

        <div class="terminated">

            <p>${msg}</p>
        </div>
    `;
}

function startExam(){
    const name = document.getElementById("name").value.trim();
    const number = document.getElementById("number").value.trim();

    if(!name || !number){
        alert("Please fill in all fields.");
        return;
    }

    examStarted = true;

    document.getElementById("studentName").innerText = name;
    document.getElementById("studentNumber").innerText = number;

    document.getElementById("loginPage").style.display="none";
    document.getElementById("examPage").style.display="block";
}

document.addEventListener("visibilitychange", function(){
    if(examStarted && document.hidden){
        terminateExam("Tab switching detected.");
    }
});

document.addEventListener("keydown", function(e){
    if(!examStarted) return;

    if(e.key==="F5" || (e.ctrlKey && e.key.toLowerCase()==="r")){
        e.preventDefault();
        terminateExam("Refresh detected.");
    }
});

history.pushState(null,null,location.href);
window.onpopstate = function(){
    terminateExam("Back button detected.");
};

function generateQuestion(){
    if(count >= 5) return;

    let pool = (count < 2) ? termBank : generalBank;
    let question;

    do{
        question = pool[Math.floor(Math.random()*pool.length)];
    } while(usedQuestions.includes(question));

    usedQuestions.push(question);
    count++;

    document.getElementById("count").innerText = count;
    document.getElementById("questionBox").innerHTML =
        `Determine whether the following infinite geometric series converges or diverges.<br><br>${question}`;

    if(window.MathJax){
        MathJax.typesetPromise();
    }

    if(count >= 5){
        document.getElementById("randomBtn").disabled = true;
    }
}
